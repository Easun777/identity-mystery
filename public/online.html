<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>身份谜局 · 联机版</title>
<style>
:root {
  --bg: #1a3a1a; --table: #2d5a27; --card-bg: #f5f0e8; --card-border: #8b7355;
  --accent: #c9a96e; --danger: #c0392b; --info: #2980b9; --text: #2c2c2c;
  --light-text: #f0e6d3; --shadow: 0 4px 12px rgba(0,0,0,0.3);
  --player-bg: rgba(0,0,0,0.35); --highlight: #f39c12; --success: #27ae60;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--light-text); min-height: 100vh;
  background-image: radial-gradient(ellipse at center, #2d5a27 0%, #1a3a1a 70%);
}

/* ===== CONNECT SCREEN ===== */
#connect-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}
#connect-screen h1 { font-size:clamp(2rem,5vw,3.5rem); color:var(--accent); text-shadow:2px 2px 8px rgba(0,0,0,0.5); margin-bottom:8px; letter-spacing:4px; }
#connect-screen .subtitle { color:#b8956a; font-size:1.1rem; margin-bottom:8px; }
#connect-screen .badge { font-size:0.8rem; background:var(--accent); color:#1a3a1a; padding:2px 10px; border-radius:10px; }
.connect-card {
  background:var(--player-bg); border:2px solid var(--accent); border-radius:16px;
  padding:28px 36px; max-width:440px; width:90%; backdrop-filter:blur(8px); margin-top:24px;
}
.connect-card label { display:block; font-size:1rem; margin-bottom:6px; color:var(--accent); }
.connect-card input {
  width:100%; padding:12px; font-size:1rem; border-radius:10px;
  border:2px solid var(--accent); background:rgba(0,0,0,0.3); color:var(--light-text);
  margin-bottom:18px; outline:none;
}
.connect-card input:focus { border-color:var(--highlight); }
.btn-row { display:flex; gap:10px; }
.btn {
  flex:1; padding:12px; font-size:1rem; border-radius:10px; cursor:pointer;
  font-weight:bold; letter-spacing:1px; transition:all 0.2s; border:none;
}
.btn-primary { background:var(--accent); color:#1a3a1a; }
.btn-primary:hover { background:#d4b87a; transform:translateY(-2px); }
.btn-secondary { background:rgba(255,255,255,0.1); color:var(--light-text); border:1px solid var(--accent); }
.btn-secondary:hover { background:rgba(255,255,255,0.2); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-sm { padding:6px 14px; font-size:0.85rem; border-radius:6px; cursor:pointer; border:1px solid var(--accent); background:transparent; color:var(--accent); }

/* ===== LOBBY ===== */
#lobby-screen { display:none; }
#lobby-screen.active { display:flex; flex-direction:column; align-items:center; padding:40px 20px; min-height:100vh; }
.lobby-card {
  background:var(--player-bg); border:2px solid var(--accent); border-radius:16px;
  padding:28px 36px; max-width:480px; width:90%; text-align:center;
}
.lobby-card h2 { color:var(--accent); margin-bottom:8px; }
.room-code {
  font-size:2rem; letter-spacing:8px; color:var(--highlight); font-weight:bold;
  margin:12px 0; font-family:monospace;
}
.player-list { margin:16px 0; text-align:left; }
.player-list-item {
  padding:8px 12px; margin:4px 0; background:rgba(255,255,255,0.05);
  border-radius:8px; display:flex; justify-content:space-between; align-items:center;
}
.player-list-item .badge-ai { font-size:0.7rem; background:#666; padding:2px 6px; border-radius:6px; }
.player-list-item .badge-host { font-size:0.7rem; background:var(--accent); color:#1a3a1a; padding:2px 6px; border-radius:6px; }

/* ===== GAME SCREEN ===== */
#game-screen { display:none; }
#game-screen.active { display:flex; flex-direction:column; min-height:100vh; }
.game-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; background:rgba(0,0,0,0.3); border-bottom:1px solid rgba(201,169,110,0.3);
  flex-wrap:wrap; gap:8px;
}
.game-header .title { color:var(--accent); font-size:1.3rem; font-weight:bold; }
.game-body { flex:1; display:flex; flex-direction:column; padding:12px; gap:12px; }

.opponents-area { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.player-panel {
  background:var(--player-bg); border:2px solid rgba(201,169,110,0.3);
  border-radius:12px; padding:10px 14px; min-width:120px; text-align:center; transition:all 0.3s;
}
.player-panel.active-turn { border-color:var(--highlight); box-shadow:0 0 16px rgba(243,156,18,0.4); animation:pulse 1.5s infinite; }
@keyframes pulse {
  0%,100% { box-shadow:0 0 12px rgba(243,156,18,0.3); }
  50% { box-shadow:0 0 24px rgba(243,156,18,0.6); }
}
.player-panel .player-name { font-weight:bold; font-size:0.95rem; margin-bottom:4px; }
.player-panel .card-count { font-size:0.8rem; color:#9a8c7a; }
.opponent-cards { display:flex; gap:4px; justify-content:center; margin-top:4px; }
.mini-card { width:28px; height:40px; background:linear-gradient(135deg,#3a3a8c,#252550); border:1px solid #555; border-radius:3px; }

.your-hand-area {
  background:var(--player-bg); border:2px solid var(--accent); border-radius:16px;
  padding:16px 20px; margin-top:auto;
}
.your-hand-area h3 { color:var(--accent); margin-bottom:10px; font-size:1rem; display:flex; align-items:center; gap:8px; }
.your-hand-area h3 .badge { font-size:0.7rem; background:var(--highlight); color:#1a3a1a; padding:2px 8px; border-radius:10px; }
.cards-hand { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }

.card {
  width:clamp(80px,18vw,110px); height:clamp(120px,26vw,160px);
  background:var(--card-bg); border:3px solid var(--card-border); border-radius:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.25s; position:relative;
  box-shadow:0 3px 8px rgba(0,0,0,0.25); color:var(--text); user-select:none;
}
.card:hover { transform:translateY(-8px); box-shadow:0 10px 24px rgba(0,0,0,0.4); }
.card.selected { border-color:var(--highlight); box-shadow:0 0 20px rgba(243,156,18,0.6); transform:translateY(-10px); }
.card.unplayable { opacity:0.5; cursor:not-allowed; }
.card.unplayable:hover { transform:none; box-shadow:0 3px 8px rgba(0,0,0,0.25); }
.card .card-icon { font-size:clamp(1.6rem,5vw,2.4rem); margin-bottom:4px; }
.card .card-name { font-size:clamp(0.7rem,2vw,0.9rem); font-weight:bold; text-align:center; }
.card .card-type { font-size:0.65rem; color:#8b7355; }
.card .card-desc { font-size:0.6rem; color:#666; text-align:center; margin-top:2px; line-height:1.2; padding:0 4px; }

.log-area {
  background:rgba(0,0,0,0.4); border-radius:10px; padding:10px 14px;
  max-height:130px; overflow-y:auto; font-size:0.8rem; color:#b8956a; line-height:1.6;
}
.log-area .log-entry { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.log-area .important { color:var(--highlight); font-weight:bold; }
.log-area .danger { color:#e74c3c; }
.log-area .success { color:#2ecc71; }
.log-area .info { color:#3498db; }

/* Modal */
.modal-overlay {
  position:fixed; top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100;
}
.modal-dialog {
  background:#2d5a27; border:2px solid var(--accent); border-radius:16px;
  padding:24px 28px; max-width:420px; width:90%; color:var(--light-text); text-align:center;
}
.modal-dialog h2 { color:var(--accent); margin-bottom:12px; }
.player-select-list { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:12px 0; }
.player-select-item {
  padding:8px 16px; background:rgba(201,169,110,0.15);
  border:2px solid rgba(201,169,110,0.4); border-radius:8px; cursor:pointer; transition:all 0.2s;
}
.player-select-item:hover, .player-select-item.chosen { background:var(--accent); color:#1a3a1a; font-weight:bold; }

.game-over-overlay {
  position:fixed; top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:200;
}
.game-over-box {
  text-align:center; padding:40px; background:#2d5a27; border-radius:20px;
  border:3px solid var(--accent); max-width:500px; width:90%;
}
.game-over-box .result-icon { font-size:4rem; margin-bottom:8px; }
.game-over-box h2 { font-size:2rem; margin-bottom:8px; }
.game-over-box .result-detail { color:#b8956a; margin-bottom:20px; line-height:1.6; }

#error-toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  background:var(--danger); color:#fff; padding:10px 24px; border-radius:10px;
  z-index:300; display:none; font-weight:bold;
}

@media (max-width:600px) {
  .opponents-area { gap:6px; }
  .player-panel { min-width:80px; padding:8px 10px; }
  .cards-hand { gap:6px; }
}
</style>
</head>
<body>

<!-- ===== CONNECT SCREEN ===== -->
<div id="connect-screen">
  <h1>🃏 身份谜局</h1>
  <div class="subtitle">联机版 · 卡牌推理桌游</div>
  <span class="badge">3-8人 · 房间制</span>
  <div class="connect-card">
    <label for="player-name">👤 你的昵称</label>
    <input type="text" id="player-name" placeholder="输入昵称..." maxlength="12" value="">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="createRoom()">🏠 创建房间</button>
      <button class="btn btn-secondary" onclick="showJoinRoom()">🚪 加入房间</button>
    </div>
  </div>
</div>

<!-- ===== LOBBY SCREEN ===== -->
<div id="lobby-screen">
  <div class="lobby-card">
    <h2>🎴 等待玩家加入</h2>
    <div>房间号：</div>
    <div class="room-code" id="room-code-display">------</div>
    <div class="player-list" id="lobby-player-list"></div>
    <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-primary" id="btn-start" onclick="startGame()" style="display:none;">🎮 开始游戏</button>
      <button class="btn btn-sm" id="btn-add-ai" onclick="addAI()">🤖 添加AI</button>
      <button class="btn btn-sm" id="btn-remove-ai" onclick="removeAI()">➖ 移除AI</button>
    </div>
    <div style="margin-top:12px;font-size:0.8rem;color:#9a8c7a;">
      需要至少3人（含AI）才能开始
    </div>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen">
  <div class="game-header">
    <span class="title">🃏 身份谜局</span>
    <span id="round-info">回合 1</span>
    <span id="room-tag" style="font-size:0.8rem;color:#b8956a;"></span>
  </div>
  <div class="game-body">
    <div class="opponents-area" id="opponents-area"></div>
    <div class="log-area" id="log-area"><div class="log-entry">等待游戏开始...</div></div>
    <div class="your-hand-area">
      <h3>🫵 我的手牌 <span class="badge" id="hand-count">0 张</span></h3>
      <div class="cards-hand" id="cards-hand"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="error-toast"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ================================================================
// SOCKET CONNECTION
// ================================================================
const socket = io({ path: '/api/io', transports: ['polling'] });
let myRoomCode = null;
let myPlayerIdx = -1;
let isHost = false;
let gameStarted = false;
let myHand = [];
let currentTurn = -1;

const CARD_DEFS = {
  first_finder:    { name:'第一发现者', icon:'🔍', type:'主动', desc:'必须第一个打出，启动游戏' },
  criminal:        { name:'犯人',     icon:'🦹', type:'主动', desc:'仅剩此一张时可打出，犯人阵营获胜' },
  accomplice:      { name:'共犯',     icon:'🕵️', type:'主动', desc:'亮明犯人阵营身份' },
  detective:       { name:'侦探',     icon:'🔎', type:'主动', desc:'指控一人：有犯人无不在场证明即胜' },
  alibi:           { name:'不在场证明', icon:'🛡️', type:'被动', desc:'在手牌中免疫侦探指控' },
  witness:         { name:'目击者',   icon:'👁️', type:'主动', desc:'查看一名其他玩家的所有手牌' },
  rumor:           { name:'谣言',     icon:'💬', type:'主动', desc:'全体从上家随机抽1张牌' },
  trade:           { name:'交易',     icon:'🤝', type:'主动', desc:'与一名玩家秘密交换1张手牌' },
  intel_exchange:  { name:'情报交换', icon:'📨', type:'主动', desc:'每人选1张传给下家' },
  civilian:        { name:'普通人',   icon:'🧑', type:'主动', desc:'无效果，纯粹消耗手牌' },
  divine_dog:      { name:'神犬',     icon:'🐕', type:'主动', desc:'弃掉一人1张牌，弃掉犯人即胜' },
};

const TARGET_CARDS = ['detective', 'witness', 'trade', 'divine_dog'];

// ================================================================
// UI HELPERS
// ================================================================
function toast(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

function showScreen(id) {
  ['connect-screen','lobby-screen','game-screen'].forEach(s => {
    const el = document.getElementById(s);
    if (s === id) el.classList.add('active');
    else { el.classList.remove('active'); el.style.display = (s === id) ? '' : 'none'; }
  });
  if (id === 'connect-screen') document.getElementById('connect-screen').style.display = 'flex';
  if (id === 'lobby-screen') document.getElementById('lobby-screen').style.display = 'flex';
  if (id === 'game-screen') document.getElementById('game-screen').style.display = 'flex';
}

function getCardDef(id) { return CARD_DEFS[id] || { name:'?', icon:'❓', type:'', desc:'' }; }

// ================================================================
// CONNECT / CREATE / JOIN
// ================================================================
function getPlayerName() {
  let name = document.getElementById('player-name').value.trim();
  if (!name) name = '玩家' + Math.floor(Math.random() * 1000);
  return name;
}

function createRoom() {
  const name = getPlayerName();
  socket.emit('create_room', name, (res) => {
    if (res.success) {
      myRoomCode = res.code;
      isHost = true;
      showLobby(res.players);
    } else {
      toast(res.error);
    }
  });
}

function showJoinRoom() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-dialog">
      <h2>🚪 加入房间</h2>
      <input type="text" id="join-code-input" placeholder="输入6位房间号" maxlength="6"
        style="width:100%;padding:12px;font-size:1.2rem;text-align:center;letter-spacing:6px;
        border-radius:10px;border:2px solid var(--accent);background:rgba(0,0,0,0.3);color:var(--light-text);
        font-family:monospace;text-transform:uppercase;margin:12px 0;outline:none;">
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-join-confirm">加入</button>
        <button class="btn btn-secondary" id="btn-join-cancel">取消</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  document.getElementById('btn-join-cancel').onclick = () => modal.remove();
  document.getElementById('btn-join-confirm').onclick = () => {
    const code = document.getElementById('join-code-input').value.trim().toUpperCase();
    if (!code) { toast('请输入房间号'); return; }
    const name = getPlayerName();
    socket.emit('join_room', { code, playerName: name }, (res) => {
      if (res.success) {
        myRoomCode = res.code;
        isHost = false;
        modal.remove();
        showLobby(res.players);
      } else {
        toast(res.error);
      }
    });
  };

  // Focus input
  setTimeout(() => document.getElementById('join-code-input').focus(), 100);
}

function showLobby(players) {
  showScreen('lobby-screen');
  document.getElementById('room-code-display').textContent = myRoomCode;
  document.getElementById('btn-start').style.display = isHost ? 'inline-block' : 'none';
  document.getElementById('btn-add-ai').style.display = isHost ? 'inline-block' : 'none';
  document.getElementById('btn-remove-ai').style.display = isHost ? 'inline-block' : 'none';
  updateLobbyPlayers(players);
}

function updateLobbyPlayers(players) {
  const list = document.getElementById('lobby-player-list');
  list.innerHTML = players.map((p, i) => `
    <div class="player-list-item">
      <span>${i + 1}. ${p.name} ${p.isAI ? '<span class="badge-ai">AI</span>' : ''} ${p.isHost ? '<span class="badge-host">房主</span>' : ''}</span>
    </div>
  `).join('');
}

function addAI() {
  if (!isHost || gameStarted) return;
  socket.emit('add_ai');
}

function removeAI() {
  if (!isHost || gameStarted) return;
  socket.emit('remove_ai');
}

function startGame() {
  if (!isHost || gameStarted) return;
  socket.emit('start_game', (res) => {
    if (!res.success) toast(res.error);
  });
}

// ================================================================
// GAME RENDERING
// ================================================================
let gameStateCache = null;

function renderGame(state) {
  gameStateCache = state;
  gameStarted = true;
  myPlayerIdx = state.playerIdx;
  myHand = state.myHand;
  currentTurn = state.currentPlayer;
  
  showScreen('game-screen');
  document.getElementById('room-tag').textContent = `房间: ${myRoomCode}`;
  document.getElementById('round-info').textContent = `回合 ${state.turnNumber}`;
  
  renderOpponents(state);
  renderMyHand(state);
}

function renderOpponents(state) {
  const container = document.getElementById('opponents-area');
  let html = '';
  for (const opp of state.opponents) {
    const isActive = opp.idx === state.currentPlayer && !state.gameOver;
    html += `<div class="player-panel${isActive ? ' active-turn' : ''}">
      <div class="player-name">${opp.name}${opp.isAI ? ' 🤖' : ''}</div>
      <div class="card-count">🂠 ${opp.cardCount} 张</div>
      <div class="opponent-cards">
        ${Array.from({length: opp.cardCount}, () => '<div class="mini-card"></div>').join('')}
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function renderMyHand(state) {
  const container = document.getElementById('cards-hand');
  const isMyTurn = state.currentPlayer === state.playerIdx && !state.gameOver;
  document.getElementById('hand-count').textContent = `${state.myHand.length} 张`;
  
  let html = '';
  for (const cardId of state.myHand) {
    const def = getCardDef(cardId);
    const canPlay = canIPlay(cardId, state);
    html += `<div class="card${(!canPlay && isMyTurn) ? ' unplayable' : ''}"
      data-card="${cardId}"
      onclick="onCardClick('${cardId}', ${isMyTurn})">
      <div class="card-icon">${def.icon}</div>
      <div class="card-name">${def.name}</div>
      <div class="card-type">${def.type}</div>
      <div class="card-desc">${def.desc}</div>
    </div>`;
  }
  container.innerHTML = html;
}

function canIPlay(cardId, state) {
  if (state.turnNumber === 1 && cardId === 'first_finder') return true;
  if (state.turnNumber === 1 && state.myHand.includes('first_finder') && cardId !== 'first_finder') return false;
  if (cardId === 'criminal') return state.myHand.length === 1;
  return true;
}

// ================================================================
// PLAYER ACTIONS
// ================================================================
function onCardClick(cardId, isMyTurn) {
  if (!isMyTurn) return;
  if (gameStateCache.gameOver) return;
  
  const state = gameStateCache;

  if (state.turnNumber === 1 && state.myHand.includes('first_finder') && cardId !== 'first_finder') {
    toast('第一回合必须打出「第一发现者」！');
    return;
  }
  
  if (cardId === 'criminal' && state.myHand.length !== 1) {
    toast('犯人只能在只剩这一张手牌时才能打出！');
    return;
  }

  if (TARGET_CARDS.includes(cardId)) {
    showTargetSelection(cardId, state);
  } else {
    showConfirm(cardId);
  }
}

function showConfirm(cardId) {
  const def = getCardDef(cardId);
  removeModal();
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-dialog">
      <h2>确认出牌</h2>
      <p>确定要打出 <strong>${def.name} ${def.icon}</strong> 吗？</p>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="confirm-btn">✅ 确定</button>
        <button class="btn btn-secondary" id="cancel-btn">❌ 取消</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  document.getElementById('confirm-btn').onclick = () => {
    modal.remove();
    socket.emit('play_card', { cardId });
  };
  document.getElementById('cancel-btn').onclick = () => modal.remove();
}

function showTargetSelection(cardId, state) {
  const def = getCardDef(cardId);
  removeModal();
  
  let targetsHtml = '';
  for (const opp of state.opponents) {
    targetsHtml += `<div class="player-select-item" data-target="${opp.idx}">
      ${opp.name} (${opp.cardCount} 张手牌)
    </div>`;
  }

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-dialog">
      <h2>${def.name} ${def.icon}</h2>
      <p>${def.desc}</p>
      <p style="color:var(--accent);">选择目标：</p>
      <div class="player-select-list">${targetsHtml}</div>
      <button class="btn btn-secondary" id="cancel-target-btn">取消</button>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelectorAll('.player-select-item').forEach(el => {
    el.onclick = () => {
      const targetIdx = parseInt(el.dataset.target);
      modal.remove();

      if (cardId === 'trade') {
        // Trade handled separately via select_trade_card event
        socket.emit('play_card_target', { cardId, targetIdx });
      } else if (cardId === 'divine_dog') {
        // Divine dog: server picks random
        socket.emit('play_card_target', { cardId, targetIdx });
      } else {
        // Detective, witness: direct target
        socket.emit('play_card_target', { cardId, targetIdx });
      }
    };
  });

  document.getElementById('cancel-target-btn').onclick = () => modal.remove();
}

function removeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
}

// ================================================================
// SOCKET EVENT HANDLERS
// ================================================================
socket.on('player_joined', (data) => {
  updateLobbyPlayers(data.players);
});

socket.on('player_left', (data) => {
  updateLobbyPlayers(data.players);
});

socket.on('you_are_host', () => {
  isHost = true;
  document.getElementById('btn-start').style.display = 'inline-block';
  document.getElementById('btn-add-ai').style.display = 'inline-block';
  document.getElementById('btn-remove-ai').style.display = 'inline-block';
  toast('你成为了新房主！');
});

socket.on('game_state', (state) => {
  renderGame(state);
});

socket.on('log', ({ msg, cls }) => {
  const container = document.getElementById('log-area');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (cls ? ' ' + cls : '');
  entry.textContent = msg;
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;
});

socket.on('witness_result', ({ targetName, cards }) => {
  removeModal();
  const cardsStr = cards.map(c => getCardDef(c).name + getCardDef(c).icon).join('、');
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-dialog">
      <h2>👁️ 目击结果</h2>
      <p><strong>${targetName}</strong> 的手牌：</p>
      <div style="font-size:1.2rem;margin:12px 0;">${cardsStr || '（空）'}</div>
      <button class="btn btn-primary" id="witness-ok-btn">知道了</button>
    </div>
  `;
  document.body.appendChild(modal);
  document.getElementById('witness-ok-btn').onclick = () => modal.remove();
});

socket.on('select_trade_card', ({ targetName, myCards }) => {
  removeModal();
  let cardsHtml = '';
  for (const c of myCards) {
    const def = getCardDef(c);
    cardsHtml += `<div class="player-select-item" data-card="${c}">${def.icon} ${def.name}</div>`;
  }
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-dialog">
      <h2>🤝 交易</h2>
      <p>选择一张牌与 <strong>${targetName}</strong> 交换：</p>
      <div class="player-select-list">${cardsHtml}</div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelectorAll('.player-select-item').forEach(el => {
    el.onclick = () => {
      const cardId = el.dataset.card;
      modal.remove();
      socket.emit('trade_card_selected', { cardId });
    };
  });
});

socket.on('select_intel_card', ({ myCards }) => {
  removeModal();
  let cardsHtml = '';
  for (const c of myCards) {
    const def = getCardDef(c);
    cardsHtml += `<div class="player-select-item" data-card="${c}">${def.icon} ${def.name}</div>`;
  }
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-dialog">
      <h2>📨 情报交换</h2>
      <p>选择一张牌传给下家：</p>
      <div class="player-select-list">${cardsHtml}</div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelectorAll('.player-select-item').forEach(el => {
    el.onclick = () => {
      const cardId = el.dataset.card;
      modal.remove();
      socket.emit('intel_card_selected', { cardId });
    };
  });
});

socket.on('error_msg', (msg) => {
  toast(msg);
});

socket.on('game_over', (data) => {
  removeModal();
  let revealHtml = '';
  for (const h of data.allHands) {
    const cardsStr = h.cards.map(c => getCardDef(c).name + getCardDef(c).icon).join(' ');
    revealHtml += `<div>${h.name}：${cardsStr || '（无）'}</div>`;
  }

  const overlay = document.createElement('div');
  overlay.className = 'game-over-overlay';
  overlay.id = 'game-over-overlay';
  overlay.innerHTML = `
    <div class="game-over-box">
      <div class="result-icon">${data.reason === 'criminal' ? '🦹' : '🎉'}</div>
      <h2>${data.winnerTeam}获胜！</h2>
      <div class="result-detail">
        <p>${data.detail}</p>
        <div style="margin-top:12px;font-size:0.85rem;color:#b8956a;">${revealHtml}</div>
      </div>
      <button class="btn btn-primary" id="btn-restart">🔄 再来一局</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('btn-restart').onclick = () => {
    socket.emit('restart_game');
  };
});

// Remove game-over overlay on restart
socket.on('game_restarted', () => {
  const overlay = document.getElementById('game-over-overlay');
  if (overlay) overlay.remove();
  // Clear log for new game
  document.getElementById('log-area').innerHTML = '<div class="log-entry">🔄 新一局开始...</div>';
});

// ================================================================
// INIT
// ================================================================
// Random default name
document.getElementById('player-name').value = '玩家' + Math.floor(Math.random() * 1000);
showScreen('connect-screen');
</script>
</body>
</html>
